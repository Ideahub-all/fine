<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статья — IdeaHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // Load the correct CSS (dev: /src/styles/, prod: /assets/)
    (function() {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = '/src/styles/style.css';
      link.onerror = function() {
        // Fallback: find the built CSS
        fetch('/').then(function(r) { return r.text(); }).then(function(html) {
          var m = html.match(/href="([^"]*index-[^"]*\.css)"/);
          if (m) { link.href = m[1]; } else { link.href = '/assets/index-BwZWSLpq.css'; }
        }).catch(function(){});
      };
      document.head.appendChild(link);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Article page overrides */
    .article-navbar {
      position: fixed;
      top: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 900px;
      width: calc(100% - 3rem);
    }
    .article-nav-back {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-color);
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.2s;
    }
    .article-nav-back:hover {
      background: rgba(255,255,255,0.14);
      transform: scale(1.05);
    }
    .article-nav-back i { width: 18px; height: 18px; }
    .article-nav-title {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      padding: 0.7rem 1.5rem;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-color);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    body.theme-light .article-nav-back,
    body.theme-light .article-nav-title {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.1);
    }
    .article-page-main {
      padding-top: 6.5rem;
      padding-bottom: 4rem;
      max-width: 820px;
      margin: 0 auto;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }
    .article-cover {
      width: 100%;
      height: 340px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 2rem;
      display: block;
    }
    .article-meta-bar {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      opacity: 0.65;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .article-meta-bar .meta-chip {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .article-meta-bar i { width: 14px; height: 14px; }
    .article-page-title {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .article-category-badge {
      display: inline-block;
      background: rgba(var(--accent-rgb), 0.18);
      color: var(--accent-color);
      border: 1px solid rgba(var(--accent-rgb), 0.3);
      padding: 0.25rem 0.9rem;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
    }
    .article-body {
      font-size: 1.08rem;
      line-height: 1.85;
      opacity: 0.9;
    }
    .article-body h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 2rem 0 0.8rem;
      color: var(--text-color);
    }
    .article-body p {
      margin-bottom: 1.2rem;
      color: var(--text-color);
    }

    /* Search bar on articles tab */
    .articles-search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      max-width: 520px;
      margin: 0 auto 2rem;
      position: relative;
    }
    .articles-search-input-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }
    .articles-search-input-wrap .search-icon-inner {
      position: absolute;
      left: 1rem;
      color: var(--text-color);
      opacity: 0.4;
      width: 16px;
      height: 16px;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .articles-search-input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.75rem;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--text-color);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .articles-search-input::placeholder { opacity: 0.45; }
    .articles-search-input:focus {
      border-color: rgba(var(--accent-rgb), 0.5);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.12);
    }
    .articles-search-input:focus ~ .search-icon-inner,
    .articles-search-input-wrap:focus-within .search-icon-inner {
      opacity: 0.7;
    }
    body.theme-light .articles-search-input {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.1);
    }
    .articles-search-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--accent-color);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 14px rgba(var(--accent-rgb), 0.3);
    }
    .articles-search-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(var(--accent-rgb), 0.45);
    }
    .articles-search-btn i { width: 18px; height: 18px; }
  </style>
</head>
<body class="bg-match">

  <div class="gradient-orb orb1"></div>
  <div class="gradient-orb orb2"></div>
  <div class="gradient-orb orb3"></div>

  <div id="toastContainer" class="toast-container"></div>

  <header class="article-navbar">
    <a href="/" class="article-nav-back" title="Назад к статьям">
      <i data-lucide="arrow-left"></i>
    </a>
    <div class="article-nav-title" id="articleNavTitle">Загрузка...</div>
  </header>

  <main class="article-page-main" id="articleMain">
    <div style="text-align:center; padding: 6rem 0; opacity: 0.5;">Загрузка статьи...</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== INIT THEME =====
    (function() {
      const themes = {
        'default': { bg: '#0b0d10', accent: '#00ffcc', interface: '#14181e', isDark: true },
        'midnight': { bg: '#0a0a1a', accent: '#6366f1', interface: '#12121f', isDark: true },
        'forest': { bg: '#0a1410', accent: '#22c55e', interface: '#0f1f18', isDark: true },
        'sunset': { bg: '#1a0a0f', accent: '#f97316', interface: '#1f1015', isDark: true },
        'ocean': { bg: '#0a1015', accent: '#0ea5e9', interface: '#0f1820', isDark: true },
        'rose': { bg: '#150a10', accent: '#f43f5e', interface: '#1c0f15', isDark: true },
        'light': { bg: '#f5f5f7', accent: '#00a896', interface: '#ffffff', isDark: false },
        'light-blue': { bg: '#f0f5ff', accent: '#2563eb', interface: '#ffffff', isDark: false },
        'light-warm': { bg: '#fff8f0', accent: '#ea580c', interface: '#ffffff', isDark: false },
      };
      const id = localStorage.getItem('ideahub_active_theme') || 'default';
      const custom = JSON.parse(localStorage.getItem('ideahub_custom_themes') || '[]');
      const t = custom.find(c => c.id === id) || themes[id] || themes['default'];
      const r = document.documentElement;
      r.style.setProperty('--bg-color', t.bg);
      r.style.setProperty('--accent-color', t.accent);
      r.style.setProperty('--interface-color', t.interface);
      r.style.setProperty('--text-color', t.isDark ? '#f0f2f5' : '#1a1a2e');
      r.style.setProperty('--accent-rgb', (() => {
        const h = t.accent;
        return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;
      })());
      if (!t.isDark) document.body.classList.add('theme-light');
    })();

    // ===== LOAD ARTICLE =====
    const params = new URLSearchParams(location.search);
    const articleId = parseInt(params.get('id'), 10);

    async function loadArticle() {
      const main = document.getElementById('articleMain');
      const navTitle = document.getElementById('articleNavTitle');
      try {
        const res = await fetch('/articles.json');
        const articles = await res.json();
        const article = articles.find(a => a.id === articleId);
        if (!article) {
          main.innerHTML = '<div style="text-align:center;padding:6rem 0;opacity:0.5;">Статья не найдена</div>';
          navTitle.textContent = 'Статья не найдена';
          return;
        }
        document.title = `${article.title} — IdeaHub`;
        navTitle.textContent = article.title;
        main.innerHTML = `
          ${article.cover ? `<img class="article-cover" src="${article.cover}" alt="${article.title}">` : ''}
          <span class="article-category-badge">${article.category}</span>
          <h1 class="article-page-title">${article.title}</h1>
          <div class="article-meta-bar">
            <span class="meta-chip"><i data-lucide="user"></i> ${article.author}</span>
            <span class="meta-chip"><i data-lucide="calendar"></i> ${new Date(article.date).toLocaleDateString('ru-RU')}</span>
            <span class="meta-chip"><i data-lucide="clock"></i> ${article.readTime} мин чтения</span>
            <span class="meta-chip"><i data-lucide="eye"></i> ${(article.views || 0).toLocaleString('ru-RU')}</span>
          </div>
          <div class="article-body">${article.content || '<p>Полный текст статьи скоро появится.</p>'}</div>
        `;
        if (window.lucide) lucide.createIcons();
      } catch (e) {
        main.innerHTML = '<div style="text-align:center;padding:6rem 0;opacity:0.5;">Не удалось загрузить статью</div>';
      }
    }

    // Toast helper
    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      if (!c) return;
      const t = document.createElement('div');
      t.className = `toast ${type || ''}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadArticle();
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
