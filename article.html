<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чтение статьи — IdeaHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="articles-data.js"></script>
</head>
<body class="bg-articles">

  <div class="gradient-orb orb1"></div><div class="gradient-orb orb2"></div><div class="gradient-orb orb3"></div>
  <div id="toastContainer" class="toast-container"></div>

  <header class="navbar article-header">
    <div class="navbar-container">
      <div class="navbar-left">
        <button class="article-back-btn" onclick="window.location.href='index.html'" title="К статьям">
           <i data-lucide="arrow-left"></i>
        </button>
      </div>
      
      <nav class="navbar-glass">
        <div class="navbar-glass-container" style="padding: 0 1rem; color: var(--text-color); font-weight: 600;" id="articleNavTitle">
          Загрузка...
        </div>
      </nav>

      <div class="navbar-right">
         <img src="https://ui-avatars.com/api/?name=User&background=00ffcc&color=0b0d10&bold=true" class="nav-avatar" alt="Профиль" onclick="window.location.href='index.html'">
      </div>
    </div>
  </header>

  <main class="main-content" style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">
     <div class="glass-card" style="margin-top: 2rem;" id="articleContentContainer">
     </div>
     
     <div class="glass-card" style="margin-top: 2rem;">
        <div id="commentsSection"></div>
     </div>
  </main>

  <div class="fab-container">
    <button class="fab-btn" id="fabToggleBtn">
      <i data-lucide="bookmark"></i>
    </button>
    <div class="fab-popup glass" id="fabPopup">
      <div class="navbar-glass fab-tabs-wrapper">
        <div class="navbar-tabs" id="fabTabs">
          <div class="nav-indicator" id="fabIndicator"></div>
          <button class="nav-tab active" data-fab-tab="fav-ideas" title="Избранные идеи"><i data-lucide="lightbulb"></i><span>Идеи</span></button>
          <button class="nav-tab" data-fab-tab="up-ideas" title="Лайкнутые идеи"><i data-lucide="arrow-up"></i><span>Лайки</span></button>
          <button class="nav-tab" data-fab-tab="fav-articles" title="Избранные статьи"><i data-lucide="book-open"></i><span>Статьи</span></button>
        </div>
      </div>
      <div class="fab-content-list" id="fabContentList"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = parseInt(urlParams.get('id'), 10);
        
        if (!articleId) {
            document.getElementById('articleContentContainer').innerHTML = "<p>Статья не найдена.</p>";
            return;
        }

        const articles = typeof IDEAHUB_ARTICLES !== 'undefined' ? IDEAHUB_ARTICLES : [];
        const article = articles.find(a => a.id === articleId);

        if(article) {
            document.getElementById('articleNavTitle').textContent = article.title;
            document.getElementById('articleContentContainer').innerHTML = `
                <span class="card-badge">${article.category}</span>
                <h1 style="margin-bottom: 0.5rem; font-size: 2rem;">${article.title}</h1>
                <p style="opacity: 0.6; margin-bottom: 2rem;">${article.author} · ${article.readTime} мин чтения</p>
                <div style="line-height: 1.8; font-size: 1.05rem; opacity: 0.9;">
                    ${article.content}
                </div>
                <div class="article-actions-row">
                  <button class="article-action-pill" id="articleUpvoteBtn"><i data-lucide="arrow-up"></i> Апвоут</button>
                  <button class="article-action-pill" id="articleFavBtn"><i data-lucide="bookmark"></i> В избранное</button>
                </div>
            `;
            
            const today = new Date().toDateString();
            const lastUpvote = localStorage.getItem(`upvote_date_article_${article.id}`);
            if (lastUpvote === today) document.getElementById('articleUpvoteBtn').classList.add('active');
            const favArticles = JSON.parse(localStorage.getItem('ideahub_fav_articles') || '[]');
            if (favArticles.includes(article.id)) document.getElementById('articleFavBtn').classList.add('active');

            document.getElementById('articleUpvoteBtn').addEventListener('click', async (e) => {
                const today = new Date().toDateString();
                const lastUpvote = localStorage.getItem(`upvote_date_article_${article.id}`);
                
                if(lastUpvote === today) {
                    showNotification('Вы уже отдавали голос за эту статью сегодня.', 'error');
                } else {
                    localStorage.setItem(`upvote_date_article_${article.id}`, today);
                    e.currentTarget.classList.add('active');
                    showNotification('Апвоут поставлен!');
                }
            });
            
            document.getElementById('articleFavBtn').addEventListener('click', (e) => {
                const favs = JSON.parse(localStorage.getItem('ideahub_fav_articles') || '[]');
                const idx = favs.indexOf(article.id);
                if (idx === -1) {
                    favs.push(article.id);
                    e.currentTarget.classList.add('active');
                    showNotification('Статья добавлена в избранное!');
                } else {
                    favs.splice(idx, 1);
                    e.currentTarget.classList.remove('active');
                    showNotification('Статья убрана из избранного');
                }
                localStorage.setItem('ideahub_fav_articles', JSON.stringify(favs));
            });

            if(typeof loadCommentsUI === 'function') {
                loadCommentsUI('art_' + article.id); 
            }
        }
        
        if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
